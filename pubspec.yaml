name: phao_hoa
description: "Ứng dụng quản lý kho hàng pháo hoa"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  fl_chart: ^1.2.0
  intl: ^0.20.2

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7

  # DI
  get_it: ^9.2.1
  injectable: ^2.5.0

  # Code Generation
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Functional Programming
  dartz: ^0.10.1

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  firebase_messaging: ^16.1.3

  # Notifications
  flutter_local_notifications: ^21.0.0

  # Storage
  shared_preferences: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^3.0.0
  json_serializable: ^6.9.4
  injectable_generator: ^2.7.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_logo.png"
  adaptive_icon_background: "#1a237e"
  adaptive_icon_foreground: "assets/app_logo.png"
